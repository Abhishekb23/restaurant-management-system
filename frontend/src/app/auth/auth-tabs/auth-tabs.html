<div class="min-h-screen from-blue-50 via-white to-cyan-50 flex items-center justify-center px-4 py-10">

  <div class="w-full max-w-md md:max-w-lg">

    <!-- OUTER CARD (same style as login card) -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

      <!-- SEGMENTED TAB HEADER (custom, not default material look) -->
      <div class="p-2 bg-gray-100 flex rounded-2xl m-6 mb-0">

        <button
          matRipple
          class="flex-1 py-2 text-sm font-semibold rounded-xl transition"
          [class.bg-white]="selectedTab === 0"
          [class.shadow]="selectedTab === 0"
          [class.text-blue-600]="selectedTab === 0"
          (click)="selectedTab = 0">

          User
        </button>

        <button
          matRipple
          class="flex-1 py-2 text-sm font-semibold rounded-xl transition"
          [class.bg-white]="selectedTab === 1"
          [class.shadow]="selectedTab === 1"
          [class.text-blue-600]="selectedTab === 1"
          (click)="selectedTab = 1">

          Restaurant
        </button>

      </div>

      <!-- CONTENT AREA -->
      <div class="p-2 md:p-4">

        @if (selectedTab === 0) {
          <app-user-auth></app-user-auth>
        }

        @if (selectedTab === 1) {
          <app-restaurant-auth></app-restaurant-auth>
        }

      </div>

    </div>

  </div>
</div>
